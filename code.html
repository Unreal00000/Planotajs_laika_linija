<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Plānotājs</title>

  <script>
    async function sendSignal(message) {
      console.log("Signal sent!");
      console.log("Message:", message);

      const res = await fetch("/signal", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });

      const data = await res.json();
      recieveSignal(data.modifiedMessage);
    }

    function recieveSignal(message) {
      console.log("Signal recieved!");
      console.log("Modified message:", message);
    }
  </script>


  <style>
    @import url('https://fonts.cdnfonts.com/css/seven-segment');

    .buttonBox {display:block; border:2px solid black;border-top-color:rgb(100 100 100);border-left-color:rgb(100 100 100); height:16%; width:26%; background-color:rgb(220 130 0); margin:2px; position:relative; top:1%;  font-size: 2.5rem; font-family: inherit; border-radius:10px}
    .timelineContainer {display:block; container-type:scroll-state; overflow-y:auto; overflow-x:hidden; border:3px solid black; height:70%; width:40%; background-color:rgb(240 240 240); position:absolute; top:20%; left:20%; border-radius:20px}
    .timelineElement {display:none; border:3px solid black; height:10%; width:98%; background-color:rgb(230 230 230); position:relative; top:1%; left:0.4%; border-radius:20px; margin:0.3%}
    .buttonBox:hover {background-color:rgb(190 100 0);}
    .timelineElement:hover {background-color:rgb(200 200 200);}
    .buttonBox:active {position: relative; top: 8px; right:1px; width:26.5%}

  </style>

</head>
<body>
<script type="text/javascript">

  document.addEventListener("DOMContentLoaded", function () {
    loadTimeline();
  });

  function loadTimeline() {
    const timelineElement = document.querySelector(".timelineElement")
    const timelineContainer = document.querySelector(".timelineContainer")

    for (let i = 0; i < 20; i++) {
      const clone = timelineElement.cloneNode(true)
      clone.style.display = "inline-block"
      timelineContainer.appendChild(clone)
    }
  }

  function sendSignal(message) {
    console.log("Signal sent!")
    if (message) {
      console.log("Message: " + message)
    }

  }

  function recieveSignal(message) {
    console.log("Signal recieved!")
    if (message) {
      console.log("odified message: " + message)
    }

  }
</script>

<button class="buttonBox" onClick="sendSignal(42)">Button</button>
<div class="timelineContainer"> </div>
<button class="timelineElement"> </button>

</body>
</html>
