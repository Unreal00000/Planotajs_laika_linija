<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Plānotājs</title>

  <script>
    async function sendSignal(message) {
      console.log("Signal sent!");
      console.log("Message:", message);

      const res = await fetch("/signal", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });

      const data = await res.json();
      recieveSignal(data.modifiedMessage);
    }

    function recieveSignal(message) {
      console.log("Signal recieved!");
      console.log("Modified message:", message);
    }
    // Sarkanais bloks → pievieno jaunu notikumu
    async function function_1() {
      const text = prompt("Ieraksti jauno notikumu:");
      if (!text) return;

      const res = await fetch("/add-event", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });

      const data = await res.json();
      updateTimeline(data.events);
    }

    // Atjauno zilos blokus
    function updateTimeline(events) {
      const elements = document.querySelectorAll(".timelineElement");
      elements.forEach((el, index) => {
        el.innerText = events[index] || "";
      });
    }

    // Kad lapu ielādē → ielādē arī iepriekšējos notikumus
    async function loadEvents() {
      const res = await fetch("/events");
      const data = await res.json();
      updateTimeline(data.events);
    }

    document.addEventListener("DOMContentLoaded", function () {
      loadEvents(); // iepriekšējie notikumi
    });

    // Sarkanais bloks → dzēšana
    async function function_2() {
      // Ielādē visus notikumus
      const res = await fetch("/events");
      const data = await res.json();
      const events = data.events;

      if (events.length === 0) {
        alert("Nav neviena notikuma, ko dzēst!");
        return;
      }

      // Sagatavo izvēli promptam
      let msg = "Izvēlies notikuma numuru, ko dzēst:\n";
      events.forEach((text, i) => {
        msg += `${i + 1}: ${text}\n`;
      });

      const choice = prompt(msg);
      if (!choice) return;

      const index = parseInt(choice) - 1;
      if (isNaN(index) || index < 0 || index >= events.length) {
        alert("Nepareizs izvēles numurs!");
        return;
      }

      // Nosūta dzēšanas pieprasījumu serverim
      const delRes = await fetch("/delete-event", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ index })
      });

      const delData = await delRes.json();
      updateTimeline(delData.events);
    }
  </script>

  <style>
    .timelineContainer {display:flex; container-type:scroll-state; white-space: nowrap; overflow-y:hidden; overflow-x:auto; border:3px dotted black; height:40%; width:50%; position:absolute; top:8%; left:10%; border-radius:20px}
    .timelineElement {display:none; flex: 0 0 auto; border:3px solid black; height:98%; width:10%; background-color: rgb(0, 235, 255); position:relative; top:0%; left:0%; border-radius:20px; margin:0.3%}
    .relevantContainer {display:flex; container-type:scroll-state; white-space: nowrap; overflow-y:hidden; overflow-x:auto; border:3px solid black; height:40%; width:80%; background-color: rgb(22, 158, 0); position:absolute; top:52%; left:10%; border-radius:20px}
    .relevantElement {display:none; flex: 0 0 auto; border:3px solid black; height:98%; width:20%; background-color: rgb(55, 255, 0); position:relative; top:0%; left:0.2%; border-radius:20px; margin:0.2%}
    .filterContainer {display:block; border:3px dotted black; height:99.5%; width:5%; position:absolute; top:0%; left:0%}
    .filterElement {display: inline-block; border: 3px solid black; height:25%; width:100%; background-color: rgb(255, 90, 0); position:relative}
    .todayContainer {display:block; container-type:scroll-state; overflow-y:auto; overflow-x:hidden; border:3px solid black; height:40%; width:28%; position:absolute; top:8%; left:62%; border-radius:20px; font-weight: bold; font-size:xx-large}
    .timelineElement:hover {background-color: rgb(142, 255, 235);}
    .relevantElement:hover {background-color: rgb(174, 255, 87);}
    .filterElement:hover {background-color: rgb(255, 135, 51);}
    .timelineElement:active {background-color: rgb(255, 255, 255)}
    .relevantElement:active {background-color: rgb(255, 255, 255)}
    .filterElement:active {background-color: rgb(255, 255, 255)}
    ::-webkit-scrollbar {display: none}
  </style>

</head>
<body>
<script type="text/javascript">

  function transformScroll(event) {
    if (!event.deltaY) {
      return
    }

    event.currentTarget.scrollLeft += event.deltaY + event.deltaX
    event.preventDefault()
  }

  document.addEventListener("DOMContentLoaded", function () {
    loadTimeline()
    loadRelevant()
  })

  function loadTimeline() {
    const timelineElement = document.querySelector(".timelineElement")
    const timelineContainer = document.querySelector(".timelineContainer")

    timelineContainer.addEventListener('wheel', transformScroll)

    for (let i = 0; i < 200; i++) {
      const clone = timelineElement.cloneNode(true)
      clone.style.display = "inline-block"
      clone.textContent = i
      timelineContainer.appendChild(clone)
    }
  }

  function loadRelevant() {
    const relevantElement = document.querySelector(".relevantElement")
    const relevantContainer = document.querySelector(".relevantContainer")

    relevantContainer.addEventListener('wheel', transformScroll)

    for (let i = 0; i < 6; i++) {
      const clone = relevantElement.cloneNode(true)
      clone.style.display = "inline-block"
      clone.textContent = i
      relevantContainer.appendChild(clone)
    }
  }
</script>

<div class="timelineContainer"> </div>
<button class="timelineElement"> </button>
<div class="relevantContainer"> </div>
<button class="relevantElement"> </button>
<div class="filterContainer">
  <button class="filterElement" onClick="function_1()"> function_1 </button>
  <button class="filterElement" onClick="function_2()"> function_2 </button>
  <button class="filterElement" onClick="function_3()"> function_3 </button>
  <button class="filterElement" onClick="function_4()"> function_4 </button>
</div>
<div class="todayContainer"> Šodienas aktuālais notikums! Tev vēl jāstrādā, nekādas atpūtas nebūs, līdz šis teksts netiks aizstāts ar īsto elementu! </div>

</body>
</html>
