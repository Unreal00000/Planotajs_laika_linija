<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="utf-8">
  <title>Plānotājs</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Timeline -->
<div class="timelineContainer" id="timelineContainer"></div>

<!-- Apakšējie (bez datuma vai visi) -->
<div class="relevantContainer" id="relevantContainer"></div>

<!-- Šodien -->
<div class="todayContainer" id="todayContainer"></div>

<!-- Kreisās pogas -->
<div class="filterContainer">
  <button class="filterElement" onclick="addEvent()">Pievienot</button>
  <button class="filterElement" onclick="deleteEvent()">Dzēst</button>
  <button class="filterElement" onclick="editEvent()">Rediģēt</button>
  <button class="filterElement" onclick="filterTag()">Filtrs</button>
</div>
<script src="dataloader.js" defer></script>
<script>
  let events = [];

  const todayUnix = Math.floor(Date.now() / 1000);

  // ================= LOAD =================
  async function loadEvents() {
    const res = await fetch("/events");
    const data = await res.json();
    events = data.events;
    renderAll();
  }

  // ================= RENDER =================
  function renderAll(filtered = null) {
    const list = filtered || data;

    renderTimeline(list, calendarDays);
    renderRelevant(list);
    renderToday();
  }

  // ================= TIMELINE =================
  function renderTimeline(list) {
    const container = document.getElementById("timelineContainer");
    container.innerHTML = "";

    list
            .filter(e => e.date)
            .sort((a,b) => a.date - b.date)
            .forEach(e => {
              const el = document.createElement("div");

              let className = "timelineElement";

              if (e.date < todayUnix) className = "timelineElement_past";
              else if (Math.abs(e.date - todayUnix) < 86400) className = "timelineElement_today";

              el.className = className;

              const date = new Date(e.date * 1000).toLocaleDateString();

              el.innerHTML = `
        ${e.title}
        <div class="timelineElement_date">${date}</div>
      `;

              addTagColor(e, el);

              container.appendChild(el);
            });
  }

  // ================= RELEVANT =================
  function renderRelevant(list) {
    const container = document.getElementById("relevantContainer");
    container.innerHTML = "";

    list.forEach(e => {
      const el = document.createElement("div");
      el.className = "relevantElement";

      el.innerText = e.title;

      addTagColor(e, el);

      container.appendChild(el);
    });
  }

  // ================= TODAY =================
  function renderToday(list) {
    const container = document.getElementById("todayContainer");
    container.innerHTML = "";

    const todayEvents = list.filter(e =>
            e.date && Math.abs(e.date - todayUnix) < 86400
    );

    if (todayEvents.length === 0) {
      container.innerHTML = "<h2>Šodien nav notikumu</h2>";
      return;
    }

    todayEvents.forEach(e => {
      const div = document.createElement("div");

      div.innerHTML = `
      <h2>${e.title}</h2>
      <p>${e.description || ""}</p>
      <small>${new Date(e.date * 1000).toLocaleDateString()}</small>
    `;

      container.appendChild(div);
    });
  }

  // ================= TAG COLOR =================
  function addTagColor(e, element) {
    const tagDiv = document.createElement("div");
    tagDiv.className = "tagContainer";

    const t = document.createElement("div");
    t.className = "tagElement";

    if (e.tag === "Skolas darbi") t.style.backgroundColor = "purple";
    else t.style.backgroundColor = "green";

    tagDiv.appendChild(t);
    element.appendChild(tagDiv);
  }

  async function refreshFromServer() {
    try {
      const res = await fetch("/events");
      const dataRes = await res.json();

      // pārveido servera datus, ja nepieciešams
      data = dataRes.events.map(e => ({
        name: e.name || e.title,
        date: e.date || null,
        tag: e.tag || [],
        description: e.description || ""
      }));

      // izsauc renderēšanu
      renderAll();
    } catch (err) {
      console.error("Neizdevās ielādēt datus no servera:", err);
    }
  }

  // ================= ADD =================
  async function addEvent() {
    const title = prompt("Nosaukums:");
    const dateInput = prompt("Datums (YYYY-MM-DD):");
    const description = prompt("Apraksts:");
    const tag = prompt("Tags (Skolas darbi / Ārpus skolas darbi):");

    if (!title || !dateInput) return;

    const date = Math.floor(new Date(dateInput).getTime() / 1000);

    const res = await fetch("/add-event", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ title, date, description, tag })
    });

    const data = await res.json();
    events = data.events;
    renderAll();
  }

  // ================= DELETE =================
  async function deleteEvent() {
    let msg = "ID:\n";
    events.forEach(e => msg += `${e.id}: ${e.title}\n`);

    const id = prompt(msg);
    if (!id) return;

    const res = await fetch("/delete-event", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ id: parseInt(id) })
    });

    const data = await res.json();
    events = data.events;
    renderAll();
  }

  // ================= EDIT =================
  async function editEvent() {
    let msg = "ID:\n";
    events.forEach(e => msg += `${e.id}: ${e.title}\n`);

    const id = prompt(msg);
    if (!id) return;

    const title = prompt("Jauns nosaukums:");
    const dateInput = prompt("Jauns datums (YYYY-MM-DD):");
    const description = prompt("Jauns apraksts:");
    const tag = prompt("Tags:");

    const date = Math.floor(new Date(dateInput).getTime() / 1000);

    const res = await fetch("/edit-event", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ id: parseInt(id), title, date, description, tag })
    });

    const data = await res.json();
    events = data.events;
    renderAll();
  }

  // ================= FILTER =================
  function filterTag() {
    const tag = prompt("Filtrs (Skolas darbi / Ārpus skolas darbi):");
    if (!tag) return;

    const filtered = events.filter(e => e.tag === tag);
    renderAll(filtered);
  }

  // ================= START =================
  document.addEventListener("DOMContentLoaded", loadEvents);
</script>

</body>
</html>
